<!DOCTYPE html>
<html>
<head>
  <title>Marketplace Buku Digital</title>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f4f4f4; }
    header { background:#333; color:#fff; padding:15px; text-align:center; }
    nav a { color:#fff; margin:0 10px; text-decoration:none; cursor:pointer; }
    section { display:none; padding:20px; }
    .active { display:block; }
    .book-grid { display:flex; flex-wrap:wrap; justify-content:center; }
    .book-card { background:#fff; margin:10px; padding:15px; width:200px; border-radius:8px; text-align:center;
                 box-shadow:0 0 5px rgba(0,0,0,0.2); transition:transform 0.3s; }
    .book-card:hover { transform:scale(1.05); }
    .book-card img { max-width:100%; border-radius:5px; }
    button { background:#28a745; color:#fff; border:none; padding:10px; cursor:pointer; border-radius:4px; }
    button:hover { background:#218838; }
    form { background:#fff; padding:20px; margin:20px auto; width:300px; border:1px solid #ddd; border-radius:5px; }
    form input, form select { width:100%; margin:5px 0; padding:8px; }
    form button { width:100%; background:#007bff; color:#fff; border:none; padding:10px; }
    form button:hover { background:#0056b3; }
    footer { background:#333; color:#fff; text-align:center; padding:10px; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    let cart = [];
    let books = [
      {id:1, title:"Belajar HTML & CSS", author:"Ari", category:"Teknologi", price:50000, cover:"cover1.jpg", file:"ebook1.pdf"},
      {id:2, title:"Dasar Pemrograman JavaScript", author:"Budi", category:"Teknologi", price:75000, cover:"cover2.jpg", file:"ebook2.pdf"},
      {id:3, title:"Sejarah Indonesia Modern", author:"Slamet", category:"Pendidikan", price:60000, cover:"cover3.jpg", file:"ebook3.pdf"}
    ];

    function showPage(pageId){
      document.querySelectorAll("section").forEach(sec => sec.classList.remove("active"));
      document.getElementById(pageId).classList.add("active");
      if(pageId==="home"){ renderBooks(); }
    }

    function renderBooks(){
      let grid = document.getElementById("bookGrid");
      grid.innerHTML = "";
      books.forEach(b => {
        grid.innerHTML += `
          <div class="book-card">
            <img src="${b.cover}" alt="Cover Buku">
            <h3>${b.title}</h3>
            <p>Penulis: ${b.author}</p>
            <p>Kategori: ${b.category}</p>
            <p>Rp ${b.price}</p>
            <button onclick="addToCart(${b.id},'${b.title}')">Beli</button><br>
            <a href="${b.file}" download>Unduh Buku</a>
          </div>`;
      });
    }

    function addToCart(bookId, title){
      cart.push({id: bookId, title: title});
      alert("Buku '" + title + "' ditambahkan ke keranjang!");
      updateCartDisplay();
    }

    function updateCartDisplay(){
      let cartDiv = document.getElementById("cartContent");
      cartDiv.innerHTML = "";
      cart.forEach(item => { cartDiv.innerHTML += "<p>"+item.title+" (ID: "+item.id+")</p>"; });
    }

    function checkout(){ alert("Checkout berhasil! Total item: " + cart.length); }

    window.onload = function(){
      showPage("home");
      const ctx = document.getElementById('salesChart').getContext('2d');
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: ['Jan','Feb','Mar','Apr','Mei'],
          datasets: [{
            label: 'Total Penjualan',
            data: [500000,750000,300000,900000,1200000],
            backgroundColor: 'rgba(54,162,235,0.6)'
          }]
        }
      });
    }
  </script>
</head>
<body>
<header>
  <h1>📚 Marketplace Buku Digital</h1>
  <nav>
    <a onclick="showPage('home')">Home</a>
    <a onclick="showPage('kategori')">Kategori</a>
    <a onclick="showPage('keranjang')">Keranjang</a>
    <a onclick="showPage('login')">Login</a>
    <a onclick="showPage('report')">Report</a>
  </nav>
</header>

<section id="home">
  <h2>Halaman Utama</h2>
  <div id="bookGrid" class="book-grid"></div>
</section>

<section id="kategori">
  <h2>Kategori Buku</h2>
  <ul>
    <li>Pendidikan</li>
    <li>Teknologi</li>
    <li>Bisnis</li>
    <li>Agama</li>
    <li>Fiksi</li>
  </ul>
</section>

<section id="keranjang">
  <h2>Keranjang Belanja</h2>
  <div id="cartContent"></div>
  <button onclick="checkout()">Checkout</button>
</section>

<section id="login">
  <h2>Login</h2>
  <form>
    Email: <input type="email"><br>
    Password: <input type="password"><br>
    <button type="button">Login</button>
  </form>
  <h2>Registrasi</h2>
  <form>
    Nama: <input type="text"><br>
    Email: <input type="email"><br>
    Password: <input type="password"><br>
    Role: <select><option>Pembeli</option><option>Penjual</option></select><br>
    <button type="button">Daftar</button>
  </form>
</section>

<section id="report">
  <h2>Laporan Penjualan</h2>
  <canvas id="salesChart"></canvas>
</section>

<footer>
  <p>&copy; 2026 Marketplace Buku Digital</p>
</footer>
</body>
</html>
